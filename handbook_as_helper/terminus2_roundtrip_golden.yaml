# =============================================================================
# Terminus-2 Harness ↔ Handbook  ·  NL→Code Round-Trip Golden Test Suite
# =============================================================================
# Purpose: grade a system that takes a reviewer's natural-language edit against
#          the handbook and emits the corresponding CODE change. Difficulty is
#          measured by how hard it is to REVERSE the NL into the right anchors,
#          NOT by how hard the code is to write.
#
# How to grade one case:
#   recall      = |produced_anchors ∩ must_hit| / |must_hit|
#   discriminator_score = weighted hits on `discriminators` (the easy-to-miss
#                 anchors / latent invariants a naive mapper drops)
#   precision   = 1 - |produced_anchors ∩ precision_traps| / |produced_anchors|
#   PASS iff recall == 1.0 AND all `discriminators` hit AND no precision_trap hit.
#
# Anchor format: file:symbol  [line_lo, line_hi]   (lines are reference points in
#   harbor/src/harbor/agents/terminus_2/ at the reviewed revision; treat as ±a few)
# =============================================================================

schema_version: "1.0"
target:
  agent: terminus_2
  root: harbor/src/harbor/agents/terminus_2
  primary_file: terminus_2.py
  subsystems: [terminus_2.py, terminus_json_plain_parser.py, terminus_xml_plain_parser.py, tmux_session.py, templates/terminus-json-plain.txt, templates/terminus-xml-plain.txt, templates/timeout.txt]

# Failure-mode legend (what each class stresses in the round-trip mapper)
failure_modes:
  A_fanout:            "one NL intent must fan out to multiple non-adjacent state read/write sites"
  B_latent_invariant:  "the change silently breaks an assumption the reviewer never mentioned"
  C_strategy_swap:     "a whole behavior-card cluster is replaced; consumers keyed to its shape must follow"
  D_reorder:           "reordering a loop step changes cross-iteration flag timing (source-order == logical-order bet)"
  E_new_lifecycle_state: "must synthesize new persistent state and register it at init + reset + loop"
  F_code_prose_mirror: "the same constraint is encoded in code constants AND prompt-template prose"
  G_cross_subsystem:   "one feature fans across deliberately-separated subsystem slots / exposes capability asymmetry"
  H_overloaded_concept: "one concept has multiple heterogeneous implementations; scope must be disambiguated"

# Symbolic anchors: some must_hit entries are NOT line numbers because the correct
# change is to ADD code (no pre-existing line) or to touch a whole file. The grader
# matches a produced anchor against a symbolic token iff the produced edit lands in
# the named file AND matches `match`. Keep these tokens consistent across cases.
symbolic_anchors:
  parser_json:        {file: terminus_json_plain_parser.py, match: "new/modified parse field or branch"}
  parser_xml:         {file: terminus_xml_plain_parser.py,  match: "new/modified parse block or branch"}
  parser_json_salvage: {file: terminus_json_plain_parser.py, match: "new method salvage_truncated_response (parity with xml)"}
  template_json:      {file: templates/terminus-json-plain.txt, match: "edited command/prose spec"}
  template_xml:       {file: templates/terminus-xml-plain.txt,  match: "edited command/prose spec"}
  new_param:          {file: terminus_2.py, match: "new __init__ keyword parameter + stored as self attr"}
  new_state_init:     {file: terminus_2.py, match: "new self attribute initialized in __init__"}
  new_state_reset:    {file: terminus_2.py, match: "same new attribute reset in _reset_per_run_state"}
  new_state_lifecycle: {file: terminus_2.py, match: "new persistent state registered at BOTH __init__ and _reset_per_run_state"}
  honest_no_anchor_report: {file: "(meta)", match: "system explicitly reports no single-edit anchor exists rather than emitting a forced edit"}

test_cases:

  # ---------------------------------------------------------------- A: fan-out
  - id: Q1
    title: "Triple completion confirmation"
    failure_mode: A_fanout
    difficulty: 3
    query: >
      Right now the model only has to mark `task_complete` once to reach the
      "are you sure?" step, then once more to get graded. I want a higher bar:
      the model must mark completion THREE consecutive times before we actually
      grade. The first two times just re-show the terminal state and ask "are you
      sure you want to submit?".
    expected_behavior_delta: "Completion gate requires 3 affirmative marks instead of 2; bool flag becomes a counter."
    expected_anchors:
      - "terminus_2.py:__init__  [292,292]   `_pending_completion` bool -> int counter init"
      - "terminus_2.py:_reset_per_run_state  [1574,1574]   reset counter to 0"
      - "terminus_2.py:_run_agent_loop  [1432,1438]   is_task_complete branch: increment counter; only treat as done when counter reaches 3, else re-ask"
      - "terminus_2.py:_run_agent_loop  [1552,1559]   final-return branch: only return when counter reached threshold"
    discriminators:
      - "terminus_2.py:_run_agent_loop  [1428,1428]   `was_pending_completion` snapshot must reflect counter semantics, not stale bool (most-dropped anchor)"
      - "terminus_2.py:_run_agent_loop  [1440,1440]   `self._pending_completion = False` in the NOT-complete branch must become `= 0` — this is what makes the three marks CONSECUTIVE; drop it and a model that marks complete/not/complete still passes after 2. Lives OUTSIDE the obvious gate region."
    out_of_scope_precision_traps:
      - "terminus_2.py:_get_completion_confirmation_message  [486,508]   message text need not change"
    rubric:
      must_hit: [292, 1574, 1432, 1552]
      pass_threshold: "recall==1.0 AND anchors 1428 AND 1440 hit AND no trap hit"

  - id: Q2
    title: "Remove double confirmation entirely"
    failure_mode: A_fanout
    difficulty: 3
    query: >
      Drop the whole "are you sure?" step. The moment the model emits
      `task_complete: true`, immediately take the current terminal state to
      grading and end the run — no follow-up question, no extra turn.
    expected_behavior_delta: "First task_complete=true ends the run; confirmation state and message generator deleted."
    expected_anchors:
      - "terminus_2.py:__init__  [292,292]   delete `_pending_completion`"
      - "terminus_2.py:_reset_per_run_state  [1574,1574]   delete reset line"
      - "terminus_2.py:_run_agent_loop  [1431,1438]   collapse to single 'complete -> return'"
      - "terminus_2.py:_run_agent_loop  [1552,1559]   simplify return path"
      - "terminus_2.py:_get_completion_confirmation_message  [486,508]   delete dead method"
    discriminators:
      - "terminus_2.py:_run_agent_loop  [1428,1428]   `was_pending_completion` becomes dead; must be removed not left dangling"
    out_of_scope_precision_traps:
      - "terminus_json_plain_parser / terminus_xml_plain_parser  task_complete parsing must stay intact"
    rubric:
      must_hit: [292, 1574, 1431, 1552, 486]
      pass_threshold: "recall==1.0 AND anchor 1428 removed AND parser untouched"

  - id: Q3
    title: "Confirm only on destructive tasks"
    failure_mode: A_fanout
    difficulty: 4
    query: >
      The "are you sure?" step should only fire when the run was risky: if the
      model executed a destructive command this run (e.g. `rm -rf`, `drop table`,
      `mkfs`, `dd`), require confirmation; otherwise a single completion mark
      submits directly.
    expected_behavior_delta: "Confirmation gate becomes conditional on an executed-command risk classifier."
    expected_anchors:
      - "terminus_2.py:__init__ + _reset_per_run_state  new `_executed_destructive: bool` registered at both"
      - "terminus_2.py:_execute_commands  [1235,1241]   classify each command.keystrokes as destructive, set flag"
      - "terminus_2.py:_run_agent_loop  [1431,1438]   confirmation branch: if NOT destructive, treat first complete as done; if destructive, ask"
      - "terminus_2.py:_run_agent_loop  [1552,1557]   return-vs-continue gate must agree: return immediately when non-destructive, require the extra round when destructive"
    discriminators:
      - "new state must be registered in BOTH __init__ AND _reset_per_run_state (loop-scoped accumulator pattern)"
      - "terminus_2.py:_run_agent_loop  [1552,1557]   the completion decision is SPLIT across two blocks (1431-1438 builds observation, 1552-1557 decides return/continue); conditionalizing only one desyncs them"
    out_of_scope_precision_traps:
      - "do not gate the unconditional fallthrough `prompt = observation` [1561] on the flag"
    rubric:
      must_hit: ["new_state_init", "new_state_reset", 1235, 1431, 1552]
      pass_threshold: "recall==1.0 AND both lifecycle registrations present AND both completion blocks conditionalized in sync"

  # -------------------------------------------------- B: latent invariant
  - id: Q4
    title: "Store each reasoning block as its own message"
    failure_mode: B_latent_invariant
    difficulty: 5
    query: >
      When interleaved thinking is on, I want every reasoning (thinking) block
      stored as its OWN assistant message in the chat history, instead of being
      merged into the same message as the final answer.
    expected_behavior_delta: "Chat history gains extra assistant messages; user/assistant strict alternation no longer holds."
    expected_anchors:
      - "terminus_2.py:run  [1587,1587]   Chat construction / interleaved_thinking wiring"
      - "harbor.llms.chat.Chat  message-append path (external) for reasoning blocks"
    discriminators:
      - "terminus_2.py:_summarize  [801,801]   `steps_to_include = 1 + (len-1)//2` ASSUMES strict alternation — extra reasoning messages corrupt the copied summary-trajectory step math. THE TEST: does the mapper flag this unrelated function the reviewer never mentioned?"
    out_of_scope_precision_traps: []
    rubric:
      must_hit: [1587]
      pass_threshold: "recall==1.0 AND latent invariant at 801 reported (even just as a warning)"
    note: "Smoke-test case. A pure translator hits only 1587 and passes silently; a reasoning mapper raises 801."

  - id: Q5
    title: "Percentage-based summarization trigger"
    failure_mode: B_latent_invariant
    difficulty: 4
    query: >
      Today it's "summarize when fewer than 8000 free tokens remain". Change it to
      a ratio: trigger summarization when the conversation has used 85% of the
      model's context window, so behavior is consistent across window sizes.
    expected_behavior_delta: "Threshold parameter semantics flip from absolute token count to a fraction; all comparisons convert."
    expected_anchors:
      - "terminus_2.py:__init__  [159,159][318,318]   `proactive_summarization_threshold` meaning changes (token count -> ratio)"
      - "terminus_2.py:_check_proactive_summarization  [956,980]   compare used/limit ratio instead of free_tokens"
    discriminators:
      - "terminus_2.py:_unwind_messages_to_free_tokens  [569,569]   `target_free_tokens` is a coupled absolute value; must be reconciled with the new ratio semantics"
    out_of_scope_precision_traps:
      - "do not change `_count_total_tokens` [524,528] — it is correct as-is"
    rubric:
      must_hit: [159, 956]
      pass_threshold: "recall==1.0 AND coupling at 569 addressed; surface attr re-typed semantically not literally"

  - id: Q6
    title: "Per-command observation instead of batched"
    failure_mode: B_latent_invariant
    difficulty: 4
    query: >
      Right now after a batch of commands the model only sees the final combined
      terminal screen. I want it to see the output AFTER EACH command, echoed back
      one-to-one with the command that produced it.
    expected_behavior_delta: "Each command captures its own incremental output; ObservationResult links to its source command."
    expected_anchors:
      - "terminus_2.py:_execute_commands  [1221,1251]   capture incremental output per command, return list"
      - "terminus_2.py:_run_agent_loop  [1457,1519]   build per-command ObservationResult with source_call_id"
    discriminators:
      - "terminus_2.py:_run_agent_loop  [1479,1480]   the comment 'All commands share the same terminal output ... so we omit source_call_id' is the documented invariant being INVERTED; must be updated, and source_call_id (currently never set anywhere in the file) must now be populated"
    out_of_scope_precision_traps:
      - "timeout path [1242,1249] still returns a single combined state — do not force per-command there"
    rubric:
      must_hit: [1221, 1457]
      pass_threshold: "recall==1.0 AND comment-invariant at 1479 updated AND source_call_id wired"

  # -------------------------------------------------- C: strategy swap
  - id: Q7
    title: "Collapse 3-step summarization to single pass"
    failure_mode: C_strategy_swap
    difficulty: 5
    query: >
      The context handoff is too convoluted (one sub-model writes a summary, a
      second asks questions, a third answers). Simplify it to ONE call: a single
      sub-model reads the history and directly produces the handoff note for the
      next agent.
    expected_behavior_delta: "_summarize makes one subagent call; subagent_trajectory_refs becomes length-1; consumers keyed to 3 follow."
    expected_anchors:
      - "terminus_2.py:_summarize  [740,954]   rewrite: single _run_subagent call, build handoff from its output"
      - "terminus_2.py:_run_agent_loop  [1318,1334]   system step embeds the (now shorter) refs list"
      - "terminus_2.py:_summarize  [938,943]   chat-history reset block changes (no question/answer pair)"
    discriminators:
      - "every site assuming THREE refs / three filename suffixes (summary|questions|answers) must be reduced — `_save_subagent_trajectory` filename_suffix usage [1803,1805] and the refs.append calls"
    out_of_scope_precision_traps:
      - "_run_subagent  [661,738] helper itself stays generic — do not delete it"
    rubric:
      must_hit: [740, 1318, 938]
      pass_threshold: "recall==1.0 AND all '3'-keyed structures reduced; helper preserved"

  - id: Q8
    title: "Adaptive command-duration learning (no anchor)"
    failure_mode: C_strategy_swap
    difficulty: 5
    query: >
      I want the harness to LEARN: if a class of command (say `make`, `pytest`)
      repeatedly times out because the wait time it was given was too short,
      automatically raise the default wait for that class so it times out less
      going forward.
    expected_behavior_delta: "New per-command-class duration memory influences the duration clamp / model guidance."
    expected_anchors:
      - "NO single pre-existing anchor — requires NEW state (class->duration map) at init+reset, a learning update in the _execute_commands timeout path [1242,1249], and a NEW application point (consult the map when composing the prompt guidance / choosing a default), implemented as new code rather than an edit to any existing line"
    discriminators:
      - "the correct output is an HONEST 'no single landing site; must introduce new state + update rule + application point' — NOT a forced edit to an unrelated existing line"
    out_of_scope_precision_traps:
      - "do not silently repurpose the clamp `min(duration,60)` [1208] as if it already supported learning — 1208 is the TEMPTING wrong 1-line fix, not the solution"
    rubric:
      must_hit: ["honest_no_anchor_report", "new_state_lifecycle", 1242]
      pass_threshold: "system reports that NO single-edit anchor exists, identifies the timeout path (1242) as the only legitimate learning hook, and proposes new persistent state — rather than hallucinating a 1-line fix to the duration clamp (1208)"
    note: "Probes the near-empty-anchor-scan failure mode: the only real hook is the timeout path; everything else must be newly synthesized."

  # -------------------------------------------------- D: reorder
  - id: Q9
    title: "Move proactive summarization to after the LLM call"
    failure_mode: D_reorder
    difficulty: 5
    query: >
      Move the "do we need to summarize?" check from BEFORE sending the prompt to
      AFTER we get the model's response — feels more natural to act first, then
      decide whether to compress.
    expected_behavior_delta: "Summarization decision now affects the NEXT iteration's prompt, not the current one; flag timing rewired."
    expected_anchors:
      - "terminus_2.py:_run_agent_loop  [1283,1294]   move proactive block to after the LLM interaction [1311]"
    discriminators:
      - "the block currently MUTATES the current-iteration `prompt`; after the move it can only affect the next iteration via `_pending_handoff_prompt` — the timing/semantics of [1337,1354] must be re-reasoned. THE TEST: does the mapper notice the reorder is NOT semantics-preserving?"
    out_of_scope_precision_traps:
      - "context-limit fallback summarization inside _query_llm [1022,1099] is a DIFFERENT path — do not move it"
    rubric:
      must_hit: [1283]
      pass_threshold: "recall==1.0 AND cross-iteration flag timing change explicitly handled, not a blind cut/paste"
    note: "Directly tests the 'source order == logical order' Phase-2 bet."

  # -------------------------------------------------- E: new lifecycle state
  - id: Q10
    title: "Stuck detection on unchanged output"
    failure_mode: E_new_lifecycle_state
    difficulty: 4
    query: >
      Add a stuck guard: if the terminal output is unchanged for 3 consecutive
      steps after sending commands, inject a note into the next message to the
      model — "you may be stuck, consider a different approach" — to break the loop.
    expected_behavior_delta: "New recent-output history; when 3 identical, observation is prefixed with a stuck hint."
    expected_anchors:
      - "terminus_2.py:__init__  new `_recent_outputs: list[str]`"
      - "terminus_2.py:_reset_per_run_state  [1563,1578]   reset `_recent_outputs`"
      - "terminus_2.py:_run_agent_loop  [1422,1422]   after _execute_commands, push output + compare last 3"
      - "terminus_2.py:_run_agent_loop  [1447,1447]   prefix stuck hint into observation"
    discriminators:
      - "must register at BOTH __init__ and _reset_per_run_state — mirrors the `_pending_*` 'init+reset+loop' pattern; dropping the reset leaks state across multi-step trials"
    out_of_scope_precision_traps:
      - "do not place the comparison inside _execute_commands (wrong layer)"
    rubric:
      must_hit: ["new_state_init", "new_state_reset", 1422, 1447]
      pass_threshold: "recall==1.0 AND both lifecycle registrations present"

  - id: Q11
    title: "Cost-budget early stop"
    failure_mode: E_new_lifecycle_state
    difficulty: 4
    query: >
      Add a spending cap: once total cost exceeds a configured budget (e.g. $5),
      stop the run GRACEFULLY and end, rather than running until the task times out.
    expected_behavior_delta: "Loop breaks when cumulative cost exceeds budget; teardown still records metrics."
    expected_anchors:
      - "terminus_2.py:__init__  new `cost_budget_usd` param"
      - "terminus_2.py:_run_agent_loop  [1369,1372]   after cost update, compare to budget and break (mirror session-dead exit [1279,1281])"
    discriminators:
      - "terminus_2.py:run  finally block [1634,1665] must still run to capture metrics/trajectory — the early break must exit via the same teardown, not bypass it"
    out_of_scope_precision_traps:
      - "do not hard-raise an exception that would skip the finally metric capture"
    rubric:
      must_hit: ["new_param", 1369]
      pass_threshold: "recall==1.0 AND teardown-contract preservation explicitly addressed"

  # -------------------------------------------------- F: code↔prose mirror
  - id: Q12
    title: "Allow 300s waits for long commands"
    failure_mode: F_code_prose_mirror
    difficulty: 5
    query: >
      Commands currently cap at 60 seconds. For commands that genuinely need long
      runs (compiling, full test suites), let the model set a wait of up to 300
      seconds.
    expected_behavior_delta: "Per-command duration ceiling raised to 300s across code clamp, tmux ceiling, and prompt prose."
    expected_anchors:
      - "terminus_2.py:_handle_llm_interaction  [1208,1208]   `min(parsed_cmd.duration, 60)` -> 300"
      - "templates/terminus-json-plain.txt  [41,41]   prose 'Never wait longer than 60 seconds' -> 300"
      - "templates/terminus-xml-plain.txt   [28,28]   mirrored prose 'Never wait longer than 60 seconds' -> 300"
    discriminators:
      - "tmux_session.py:send_keys  [618,618]   default `max_timeout_sec=180.0` is a HIDDEN ceiling below 300 — without raising it, 300s waits silently cap at 180. Most-dropped anchor; lives in a different subsystem file."
    out_of_scope_precision_traps:
      - "tmux_session.py  [483,483]  the unrelated `asyncio.sleep(0.5)` in session start/capture must NOT change"
    rubric:
      must_hit: [1208, "template_json", "template_xml"]
      pass_threshold: "recall==1.0 AND tmux 618 ceiling raised AND both template prose mirrors updated"
    note: "Smoke-test case for code↔prose + cross-subsystem reconciliation."

  - id: Q13
    title: "Context-window-aware output truncation"
    failure_mode: F_code_prose_mirror
    difficulty: 4
    query: >
      The terminal output the model sees is truncated to 10KB per step. For models
      with large context windows that's wasteful — scale the truncation length
      with the model's context window so big-window models see more.
    expected_behavior_delta: "_limit_output_length max_bytes derived from model context limit instead of fixed 10000."
    expected_anchors:
      - "terminus_2.py:_limit_output_length  [530,566]   gain a context-aware budget (calls get_model_context_limit)"
    discriminators:
      - "5+ call sites pass the default and must keep working: [1251],[1444],[1447],[1594], and the timeout-template path [1246] — the leaf util gaining a model dependency must not break callers"
    out_of_scope_precision_traps:
      - "the NL gives NO formula — system must propose one (e.g. bytes ∝ context_limit) and FLAG it as an assumption, not invent a magic number silently"
    rubric:
      must_hit: [530]
      pass_threshold: "recall==1.0 AND all call sites enumerated AND formula surfaced as an explicit assumption"

  - id: Q14
    title: "Unify fallback truncation with main path"
    failure_mode: F_code_prose_mirror
    difficulty: 3
    query: >
      The three-tier summarization fallback truncates the screen by taking the last
      1000 CHARACTERS, which is inconsistent with the main path that truncates by
      bytes. Unify them to one rule (token-based) so fallback and normal paths behave
      the same.
    expected_behavior_delta: "Fallback screen truncation uses the same (token-based) rule as the main observation truncation."
    expected_anchors:
      - "terminus_2.py:_query_llm  [1055,1055]   short-summary `[-1000:]` -> unified truncation"
      - "terminus_2.py:_query_llm  [1072,1072]   ultimate-fallback `[-1000:]` -> unified truncation"
    discriminators:
      - "the main path uses `_limit_output_length` (bytes); 'unify to token-based' means BOTH the fallback char-slices AND the main byte-slice converge — recognizing two differently-encoded truncation idioms is the test"
    out_of_scope_precision_traps: []
    rubric:
      must_hit: [1055, 1072]
      pass_threshold: "recall==1.0 AND both fallback slices + the main idiom reconciled to one rule"

  # -------------------------------------------------- G: cross-subsystem
  - id: Q15
    title: "First-class read_file command"
    failure_mode: G_cross_subsystem
    difficulty: 5
    query: >
      Give the model a direct way to read a file: let it emit a `read_file` command
      with a path and get the file contents back, instead of always shelling out to
      `cat` through bash.
    expected_behavior_delta: "New non-bash command type parsed, executed, and recorded as a distinct tool call."
    expected_anchors:
      - "terminus_json_plain_parser.py   add read_file to the response schema/parse"
      - "terminus_xml_plain_parser.py    add read_file block parsing"
      - "templates/terminus-json-plain.txt + terminus-xml-plain.txt   document the new command"
      - "terminus_2.py:Command dataclass  [54,57]   represent the new command kind (path field, or a command-type discriminator)"
      - "terminus_2.py:_handle_llm_interaction  [1203,1210]   build the new command from parsed result"
      - "terminus_2.py:_execute_commands  [1235,1241]   EXECUTION branch: read_file must read the file & return contents, NOT call send_keys (the loop currently only knows send_keys)"
      - "terminus_2.py:_run_agent_loop  [1470,1470]   tool_call function_name for read_file (not 'bash_command')"
    discriminators:
      - "the feature must touch BOTH parser slots (json AND xml) and BOTH templates — dropping either half is the classic cross-subsystem miss"
      - "terminus_2.py:_execute_commands  [1235,1241]   the EXECUTION path is the hidden anchor: `Command` currently flows only into `send_keys`. A mapper that adds parsing+dataclass+template but forgets the execution branch produces a feature the model can REQUEST but that silently runs as keystrokes."
    out_of_scope_precision_traps:
      - "do not add it to tmux_session.py send_keys — read_file should bypass keystroke sending"
    rubric:
      must_hit: ["parser_json", "parser_xml", "template_json", "template_xml", 54, 1203, 1235]
      pass_threshold: "recall==1.0 across all 5 slots AND the _execute_commands execution branch (1235) present"

  - id: Q16
    title: "Salvage parity: JSON truncation recovery"
    failure_mode: G_cross_subsystem
    difficulty: 4
    query: >
      When an XML response is cut off we can salvage a usable command from the
      partial output, but JSON responses can't. Give JSON responses the same
      truncation-salvage capability.
    expected_behavior_delta: "JSON parser gains salvage_truncated_response; the hasattr guard becomes always-true."
    expected_anchors:
      - "terminus_json_plain_parser.py   implement `salvage_truncated_response` (parity with xml parser)"
      - "terminus_2.py:_query_llm  [1113,1113]   `hasattr(self._parser, 'salvage_truncated_response')` guard becomes redundant"
    discriminators:
      - "the `hasattr` guard at 1113 SILENTLY encodes the capability asymmetry between subsystem_parser_json and subsystem_parser_xml — the system should surface this asymmetry, not just add a method blindly"
    out_of_scope_precision_traps:
      - "do not touch the xml parser's existing salvage — it is the reference"
    rubric:
      must_hit: ["parser_json_salvage", 1113]
      pass_threshold: "recall==1.0 AND asymmetry-at-guard explicitly noted"

  - id: Q17
    title: "Adaptive question count in handoff"
    failure_mode: G_cross_subsystem
    difficulty: 3
    query: >
      In the summarization handoff, the second sub-model is hard-told to ask "at
      least five questions". Make it adaptive to task difficulty — fewer questions
      for simple tasks, more for complex ones — instead of hard-coding 5.
    expected_behavior_delta: "Question-count guidance in the handoff prompt becomes parameterized/conditional."
    expected_anchors:
      - "terminus_2.py:_summarize  [854,854]   inline prose 'at least five, more if necessary' -> parameterized"
    discriminators:
      - "the policy lives in INLINE PROMPT PROSE, not a config constant — the editable surface is a string literal inside _summarize, which an attr-role classifier (CONFIG/CONTROL_FLAG/...) may miss because it's narrative text"
    out_of_scope_precision_traps:
      - "do not change the summary prompt [806,823] or the answer prompt [912,915] — only the questions prompt"
    rubric:
      must_hit: [854]
      pass_threshold: "recall==1.0 AND only the questions prompt touched"

  # -------------------------------------------------- H: overloaded concept
  - id: Q18
    title: "5-retry exponential backoff"
    failure_mode: H_overloaded_concept
    difficulty: 4
    query: >
      When an LLM call fails it currently retries immediately, up to 3 times. Change
      it to up to 5 retries WITH exponential backoff (wait longer after each
      failure), to be friendlier to rate limits.
    expected_behavior_delta: "Tenacity retry policy: 5 attempts + exponential wait."
    expected_anchors:
      - "terminus_2.py:_query_llm @retry  [982,993]   stop_after_attempt(3)->5, add wait=wait_exponential"
    discriminators:
      - "terminus_2.py:_query_llm  [1166,1166]   the OutputLengthExceededError path retries via MANUAL RECURSION, not tenacity — 'retry' is overloaded across two mechanisms. The system must DISAMBIGUATE scope (and surface that the manual-recursion path has no attempt cap)."
    out_of_scope_precision_traps:
      - "do not add backoff to the summarization-fallback chain [1036,1075] — that is not 'retry'"
    rubric:
      must_hit: [982]
      pass_threshold: "recall==1.0 AND the second retry mechanism at 1166 is identified and scope clarified"

  - id: Q19
    title: "linear_history + store_all_messages interaction"
    failure_mode: H_overloaded_concept
    difficulty: 5
    query: >
      I'm worried about trajectory splitting when `linear_history` AND
      `store_all_messages` are BOTH enabled. Make sure that with both on, each split
      trajectory segment keeps a correct linear history AND the full messages still
      land in metadata — nothing lost, nothing mis-attributed.
    expected_behavior_delta: "Split + metadata paths produce consistent output under the both-on config combination."
    expected_anchors:
      - "terminus_2.py:_split_trajectory_on_summarization  [1884,1909]   segment split correctness"
      - "terminus_2.py:run finally  [1661,1662]   `store_all_messages` writes chat.messages to metadata"
    discriminators:
      - "ROOT CAUSE the reviewer never states: `_summarize` resets `chat._messages` on every summarization (terminus_2.py:938), so by teardown `chat.messages` holds ONLY the final segment. Therefore `store_all_messages` at 1661 silently captures a PARTIAL history under linear_history — the both-on combination is lossy. The system must surface this, not just confirm each flag works alone."
    out_of_scope_precision_traps:
      - "do not change non-linear-history dump path [1979,1981] behavior for the both-OFF case"
    rubric:
      must_hit: [1884, 1661]
      pass_threshold: "recall==1.0 AND the cross-flag interaction explicitly reasoned"

  - id: Q20
    title: "True-infinite max episodes (contains a FALSE premise)"
    failure_mode: H_overloaded_concept
    difficulty: 4
    query: >
      With no limit set, the max number of turns is a fake-infinite 1000000, and the
      logs even print that scary number. Make it TRULY unbounded (no artificial cap)
      and stop surfacing that magic number in logs and exit logic.
    expected_behavior_delta: "No-limit case uses real unbounded iteration; the literal 1000000 removed from code + docs. NOTE: the premise 'logs print 1000000' is FALSE — nothing logs it; correct handling must not invent a log edit."
    expected_anchors:
      - "terminus_2.py:__init__  [288,288]   default `_max_episodes = 1000000` -> None/unbounded sentinel"
      - "terminus_2.py:_run_agent_loop  [1277,1277]   `for episode in range(self._max_episodes)` -> itertools.count() when unbounded"
      - "terminus_2.py:__init__ docstring  [182,182]   '(default: 1000000)' doc text"
      - "terminus_2.py:__init__ comment  [271,271]   '# 4. Default value of 1000000' comment"
    discriminators:
      - "the loop's `range()` cannot take None — the iteration construct itself must switch (itertools.count) for the unbounded case; a naive int-swap to None throws TypeError at 1277"
      - "FALSE-PREMISE handling: 1000000 is NEVER logged. Its only textual occurrences are 288 (code), 182 (docstring), 271 (comment). A correct system must NOT fabricate a 'remove from logs' edit just because the reviewer claimed logs print it."
    out_of_scope_precision_traps:
      - "terminus_2.py:__init__ warning  [282,285]   this warning fires ONLY when a limit IS set and prints the USER's limit (final_max_episodes), NOT 1000000 — editing/deleting it to chase the false 'logs print 1000000' premise BREAKS the legitimate artificial-limit warning"
      - "an explicitly user-set max_turns must STILL be honored — do not make every run unbounded"
    rubric:
      must_hit: [288, 1277]
      pass_threshold: "recall==1.0 AND iteration construct switched (not None into range) AND the warning at 282-285 left untouched AND explicit-limit path preserved"
    note: "Probes false-premise robustness: the reviewer is wrong about logs; the system must satisfy the real intent without acting on the false claim."

